<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Bảng lớp học</title>
  <desc id="desc">Minh hoạ bảng giảng và khu vực lớp học với phong cách hiện đại.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14532d"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#wall)"/>
  <rect x="120" y="80" width="960" height="520" rx="24" fill="#7c2d12"/>
  <rect x="150" y="110" width="900" height="460" rx="16" fill="url(#board)"/>
  <rect x="210" y="640" width="780" height="56" rx="10" fill="#92400e"/>
  <text x="600" y="220" fill="#dcfce7" font-size="62" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="700">BẢNG GIẢNG</text>
  <text x="600" y="308" fill="#bbf7d0" font-size="40" text-anchor="middle" font-family="'Segoe UI', sans-serif">LỚP HỌC TÍCH CỰC</text>
  <path d="M250 410h700" stroke="#86efac" stroke-width="8" stroke-linecap="round"/>
  <path d="M250 470h420" stroke="#86efac" stroke-width="8" stroke-linecap="round"/>
  <circle cx="760" cy="440" r="72" fill="#bbf7d0" opacity="0.2"/>
  <circle cx="760" cy="440" r="44" fill="#bbf7d0" opacity="0.3"/>
</svg>
