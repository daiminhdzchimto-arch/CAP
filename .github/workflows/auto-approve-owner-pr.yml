name: Auto-approve Owner PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  auto-approve:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve PR opened by repository owner
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const alreadyApproved = reviews.some((review) => {
              return review.user?.login === 'github-actions[bot]' && review.state === 'APPROVED';
            });

            if (alreadyApproved) {
              core.info('PR already has an approval from github-actions[bot].');
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: 'APPROVE',
              body: 'Auto-approved because PR is opened by repository owner.',
            });
