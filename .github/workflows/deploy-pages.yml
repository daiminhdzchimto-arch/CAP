name: "Deploy: staging & production"

on:
  push:
    branches: ["main"]
    tags: ["release-*", "v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to redeploy to production (rollback)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Generate runtime version metadata
        run: |
          FIRST_VERSION_COMMIT="$(git log --reverse --format='%H' -S"app-version" -- index.html | head -n 1)"
          if [ -z "$FIRST_VERSION_COMMIT" ]; then
            FIRST_VERSION_COMMIT="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          VERSION_SEQUENCE="$(git rev-list --count "${FIRST_VERSION_COMMIT}"..HEAD)"
          VERSION_SEQUENCE=$((VERSION_SEQUENCE + 1))
          FIRST_VERSION_DATE="$(git show -s --format=%cI "${FIRST_VERSION_COMMIT}")"
          DISPLAY_VERSION="v2.5.$(printf '%04d' "${VERSION_SEQUENCE}")-${GITHUB_SHA::7}"

          cat > version.json <<EOF
          {
            "commit": "${GITHUB_SHA}",
            "shortCommit": "${GITHUB_SHA::7}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "firstVersionCommit": "${FIRST_VERSION_COMMIT}",
            "firstVersionDate": "${FIRST_VERSION_DATE}",
            "versionSequence": ${VERSION_SEQUENCE},
            "displayVersion": "${DISPLAY_VERSION}"
          }
          EOF

      - name: Prepare deploy bundle
        run: |
          mkdir -p .deploy/site
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.deploy' \
            ./ .deploy/site/

      - name: Build metadata
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: .deploy/site
          if-no-files-found: error

  deploy_staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - name: Deploy to GitHub Pages staging
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          destination_dir: staging
          keep_files: true
          force_orphan: false

  deploy_production:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - name: Deploy to GitHub Pages production
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: true
          force_orphan: false

  deploy_preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - name: Deploy PR preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true
          force_orphan: false

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.pull_request.number }}/
        with:
          script: |
            const marker = '<!-- deploy-preview-comment -->';
            const body = `${marker}\n🚀 Preview ready: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
