name: Performance Budget / Lighthouse CI

on:
  pull_request:
    branches:
      - main
      - "feature/**"
  push:
    branches:
      - main
      - "feature/**"

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-budget:
    name: Lighthouse performance budget
    runs-on: ubuntu-latest
    env:
      BUILD_OUTPUT_DIR: .
      PSI_TARGET_URL: ${{ vars.PSI_TARGET_URL }}
      PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
      LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LHCI_SERVER_BASE_URL: ${{ vars.LHCI_SERVER_BASE_URL }}
      LHCI_SERVER_TOKEN: ${{ secrets.LHCI_SERVER_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install --no-save @lhci/cli@0.13.x

      - name: Lighthouse CI (build artifacts + budget gate)
        run: |
          npx lhci collect --numberOfRuns=3 --staticDistDir="$BUILD_OUTPUT_DIR"
          npx lhci assert --budgetsFile=.lighthouse/budget.json --assertions.categories:performance=error

      - name: Upload Lighthouse report (temporary public storage)
        if: ${{ always() }}
        run: npx lhci upload --target=temporary-public-storage

      - name: Upload Lighthouse report (LHCI server for historical trends)
        if: ${{ always() && env.LHCI_SERVER_BASE_URL != '' && env.LHCI_SERVER_TOKEN != '' }}
        run: npx lhci upload --target=lhci

      - name: Optional PSI trend check
        if: ${{ env.PSI_API_KEY != '' && env.PSI_TARGET_URL != '' }}
        run: |
          npx lhci collect --method=psi --url="$PSI_TARGET_URL" --psiApiKey="$PSI_API_KEY" --numberOfRuns=1
          npx lhci assert --budgetsFile=.lighthouse/budget.json --assertions.categories:performance=warn
