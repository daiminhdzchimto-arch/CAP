name: Baseline / Guardrail Compliance Check

on:
  pull_request:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  guardrail-compliance:
    name: Guardrail Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate baseline guardrail files are immutable
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/guardrail-compliance-check.mjs
