name: "Update version.json on main"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "version.json"
      - "CHANGELOG.md"

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate version metadata
        run: node scripts/update-version-json.mjs

      - name: Commit version.json if changed
        id: commit_version
        run: |
          if git diff --quiet -- version.json; then
            echo "No version.json changes."
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add version.json
          git commit -m "chore(version): cập nhật version.json [skip ci]"
          echo "created_commit=true" >> "$GITHUB_OUTPUT"

      - name: Rebase and push with retries
        if: steps.commit_version.outputs.created_commit == 'true'
        run: |
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Retry #$i failed, waiting..."
            sleep 2
          done

          echo "Failed to push version.json updates after retries."
          exit 1
