name: Pre-commit Hooks & Commit Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    name: Quality gates (repo-level)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository lint script
        run: npm run lint

      - name: Note about local hooks and commit lint
        run: |
          echo "Local Husky hooks and commitlint checks were intentionally removed from this repository."
          echo "Commit/push should not be blocked on contributor machines."
