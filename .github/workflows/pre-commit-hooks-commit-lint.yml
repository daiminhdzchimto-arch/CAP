name: Pre-commit Hooks & Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint-staged on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx lint-staged --diff "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            npx lint-staged --diff "${{ github.event.before }}...${{ github.sha }}"
          fi

      - name: Validate commit messages (Conventional Commits)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
          else
            npx commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose
          fi
