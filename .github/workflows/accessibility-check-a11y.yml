name: Accessibility Check (a11y)

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

concurrency:
  group: accessibility-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y-audit:
    name: Axe + Pa11y + Lighthouse audits
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve pages to scan
        id: urls
        run: |
          node <<'NODE'
          const fs = require('fs');

          const defaultUrls = [
            'http://127.0.0.1:4173/',
            'http://127.0.0.1:4173/index.html'
          ];

          const sitemapFiles = ['sitemap.xml', 'sitemap-index.xml'];
          const urls = new Set(defaultUrls);

          for (const file of sitemapFiles) {
            if (!fs.existsSync(file)) continue;
            const content = fs.readFileSync(file, 'utf8');
            const matches = content.match(/<loc>(.*?)<\/loc>/g) || [];
            for (const loc of matches) {
              const value = loc.replace('<loc>', '').replace('</loc>', '').trim();
              if (!value) continue;

              if (value.startsWith('http://127.0.0.1:4173') || value.startsWith('https://') || value.startsWith('http://')) {
                try {
                  const url = new URL(value);
                  const local = `http://127.0.0.1:4173${url.pathname}${url.search}`;
                  urls.add(local);
                } catch {
                  // ignore malformed URL
                }
              }
            }
          }

          const normalized = [...urls].map((u) => u.replace(/\/$/, '') || 'http://127.0.0.1:4173').sort();
          const output = JSON.stringify(normalized);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `list=${output}\n`);
          console.log(`Pages to audit: ${output}`);
          NODE

      - name: Start local static server
        run: |
          npx http-server . -p 4173 --silent &
          echo $! > .http-server.pid
          npx wait-on http://127.0.0.1:4173

      - name: Create Pa11y CI config
        run: |
          cat > .github/pa11y-ci.json <<'JSON'
          {
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-setuid-sandbox"]
            }
          }
          JSON

      - name: Run Pa11y (per-page report)
        env:
          TARGET_URLS: ${{ steps.urls.outputs.list }}
        run: |
          mkdir -p reports/pa11y
          node <<'NODE'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const urls = JSON.parse(process.env.TARGET_URLS || '[]');

          for (const [index, url] of urls.entries()) {
            const slug = `${String(index + 1).padStart(2, '0')}-${new URL(url).pathname.replace(/\//g, '_').replace(/^_$/, 'root') || 'root'}`;
            const reportPath = `reports/pa11y/${slug}.json`;
            console.log(`Running Pa11y for ${url}`);

            try {
              const output = execSync(`npx pa11y \"${url}\" --reporter json --config .github/pa11y-ci.json`, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'inherit'] });
              fs.writeFileSync(reportPath, output);
            } catch (error) {
              const output = error.stdout ? String(error.stdout) : '[]';
              fs.writeFileSync(reportPath, output);
            }
          }
          NODE

      - name: Install compatible Chrome + ChromeDriver (Chrome for Testing)
        run: |
          node <<'NODE'
          const { execSync } = require('child_process');
          const fs = require('fs');

          const maxBuffer = 1024 * 1024 * 10;
          const run = (command, options = {}) =>
            execSync(command, {
              encoding: 'utf8',
              maxBuffer,
              ...options
            });

          const manifestUrl = 'https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json';
          const manifest = JSON.parse(run(`curl -sSL ${manifestUrl}`));
          const stable = manifest.channels?.Stable;

          if (!stable) {
            throw new Error('No Stable channel found in Chrome for Testing manifest.');
          }

          const platforms = ['linux64', 'linux-arm64'];
          const resolveDownload = (downloads, kind) => {
            for (const platform of platforms) {
              const match = (downloads || []).find((item) => item.platform === platform);
              if (match) {
                console.log(`Using ${kind} platform: ${platform}`);
                return match;
              }
            }
            return null;
          };

          const chromeDownload = resolveDownload(stable.downloads.chrome, 'chrome');
          const chromedriverDownload = resolveDownload(stable.downloads.chromedriver, 'chromedriver');

          if (!chromeDownload || !chromedriverDownload) {
            const availableChromePlatforms = (stable.downloads.chrome || []).map((item) => item.platform).join(', ') || 'none';
            const availableDriverPlatforms = (stable.downloads.chromedriver || []).map((item) => item.platform).join(', ') || 'none';
            throw new Error(`Missing compatible Chrome/ChromeDriver downloads for Stable ${stable.version}. Available chrome platforms: ${availableChromePlatforms}. Available chromedriver platforms: ${availableDriverPlatforms}.`);
          }

          run(`curl -sSL "${chromeDownload.url}" -o /tmp/chrome-linux64.zip`, { stdio: 'inherit' });
          run(`curl -sSL "${chromedriverDownload.url}" -o /tmp/chromedriver-linux64.zip`, { stdio: 'inherit' });

          run('rm -rf /tmp/chrome-linux64 /tmp/chromedriver-linux64 /opt/chrome-for-testing', { stdio: 'inherit' });
          run('unzip -o /tmp/chrome-linux64.zip -d /tmp/chrome-linux64', { stdio: 'inherit' });
          run('unzip -o /tmp/chromedriver-linux64.zip -d /tmp/chromedriver-linux64', { stdio: 'inherit' });

          run('sudo mkdir -p /opt/chrome-for-testing', { stdio: 'inherit' });
          run('sudo cp -r /tmp/chrome-linux64/chrome-linux64 /opt/chrome-for-testing/', { stdio: 'inherit' });
          run('sudo install -m 0755 /tmp/chromedriver-linux64/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver', { stdio: 'inherit' });

          const chromeBin = '/opt/chrome-for-testing/chrome-linux64/chrome';
          run(`test -x ${chromeBin}`);

          fs.appendFileSync(process.env.GITHUB_ENV, `CHROME_BIN=${chromeBin}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, 'CHROMEDRIVER_BIN=/usr/local/bin/chromedriver\n');

          run(`${chromeBin} --version`, { stdio: 'inherit' });
          run('/usr/local/bin/chromedriver --version', { stdio: 'inherit' });
          NODE

      - name: Run axe-core (fail on critical violations)
        env:
          TARGET_URLS: ${{ steps.urls.outputs.list }}
          CHROME_BIN: ${{ env.CHROME_BIN }}
          CHROMEDRIVER_BIN: ${{ env.CHROMEDRIVER_BIN }}
        run: |
          mkdir -p reports/axe
          node <<'NODE'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const urls = JSON.parse(process.env.TARGET_URLS || '[]');
          let criticalCount = 0;
          let infraErrorCount = 0;
          const chromePath = process.env.CHROME_BIN;
          const chromedriverPath = process.env.CHROMEDRIVER_BIN;

          for (const [index, url] of urls.entries()) {
            const slug = `${String(index + 1).padStart(2, '0')}-${new URL(url).pathname.replace(/\//g, '_').replace(/^_$/, 'root') || 'root'}`;
            const reportPath = `reports/axe/${slug}.json`;
            console.log(`Running axe-core CLI for ${url}`);

            try {
              execSync(`npx --yes @axe-core/cli \"${url}\" --save \"${reportPath}\" --stdout --chromedriver-path \"${chromedriverPath}\" --chrome-path \"${chromePath}\" --chrome-options=\"no-sandbox,disable-dev-shm-usage\"`, {
                stdio: ['pipe', 'inherit', 'inherit']
              });
            } catch (error) {
              infraErrorCount += 1;
              console.error(`axe-core command failed for ${url}: ${error.message}`);
            }

            if (!fs.existsSync(reportPath)) {
              infraErrorCount += 1;
              console.error(`Accessibility report not found at ${reportPath}`);
              continue;
            }

            const result = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const critical = (result.violations || []).filter((v) => v.impact === 'critical');
            criticalCount += critical.length;

            if (critical.length > 0) {
              console.error(`Critical violations in ${url}: ${critical.length}`);
            }
          }

          if (infraErrorCount > 0) {
            console.error(`Accessibility check failed: ${infraErrorCount} infrastructure/report generation error(s) occurred.`);
            process.exit(1);
          }

          if (criticalCount > 0) {
            console.error(`Accessibility check failed: ${criticalCount} critical axe-core violation(s) found.`);
            process.exit(1);
          }

          console.log('No critical axe-core violations found.');
          NODE

      - name: Run Lighthouse accessibility audit
        env:
          TARGET_URLS: ${{ steps.urls.outputs.list }}
        run: |
          mkdir -p reports/lighthouse
          node <<'NODE'
          const { execSync } = require('child_process');

          const urls = JSON.parse(process.env.TARGET_URLS || '[]');

          for (const [index, url] of urls.entries()) {
            const slug = `${String(index + 1).padStart(2, '0')}-${new URL(url).pathname.replace(/\//g, '_').replace(/^_$/, 'root') || 'root'}`;
            const outputBase = `reports/lighthouse/${slug}`;
            console.log(`Running Lighthouse for ${url}`);

            execSync(
              `npx --yes lighthouse \"${url}\" --only-categories=accessibility --output=json --output=html --output-path=\"${outputBase}\" --chrome-flags=\"--headless --no-sandbox\" --quiet`,
              { stdio: ['pipe', 'inherit', 'inherit'] }
            );
          }
          NODE

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-reports
          path: reports/
          if-no-files-found: warn

      - name: Stop static server
        if: always()
        run: |
          if [ -f .http-server.pid ]; then
            kill "$(cat .http-server.pid)" || true
          fi
